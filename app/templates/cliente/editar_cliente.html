<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Editar Cliente</title>
</head>

<body>

    <h1>Editar Cliente</h1>

    <form method="POST">

        <label>Nome:</label>

        <input
            type="text"
            name="nome"
            value="{{ cliente.nome }}"
            required
        >

        <button type="submit">
            Salvar
        </button>

    </form>

</body>
</html>
