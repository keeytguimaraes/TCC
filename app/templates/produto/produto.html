<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">

    <title>
        Produtos
    </title>
</head>

<body>

    <h1>
        Cadastro de Produto
    </h1>

    <!-- ==========================
         FORMULÁRIO CADASTRO
    =========================== -->

    <form
        action="/produto/cadastrar"
        method="POST"
    >

        <!-- Nome -->
        <label>
            Nome do produto:
        </label>

        <input
            type="text"
            name="nome"
            required
        >

        <br><br>


        <!-- Categoria -->
        <label>
            Categoria:
        </label>

        <input
            type="text"
            name="categoria"
            required
        >

        <br><br>


        <!-- Preço de venda -->
        <label>
            Preço de venda:
        </label>

        <input
            type="number"
            step="0.01"
            name="preco_venda"
            required
        >

        <br><br>


        <!-- Quantidade por caixa -->
        <label>
            Quantidade por caixa:
        </label>

        <input
            type="number"
            name="quantidade_por_caixa"
            required
        >

        <br><br>

        <!-- Botão -->
        <button type="submit">
            Cadastrar Produto
        </button>

    </form>


    <hr>


    <h2>
        Produtos cadastrados
    </h2>

    <!-- Lista produtos -->
    <ul>

        {% for produto in produtos %}

        <li>

            ID: {{ produto.id }}
            -
            Nome: {{ produto.nome }}
            -
            Categoria: {{ produto.categoria }}
            -
            Preço: R$ {{ produto.preco_venda }}
            -
            Quantidade por caixa:
            {{ produto.quantidade_por_caixa }}

        </li>

        {% endfor %}

    </ul>

</body>
</html>
